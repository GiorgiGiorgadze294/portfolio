<section class="contact-page">
  <div class="contact-wrapper fade-in">

    <div class="contact-left">
      <h1 class="title">Get in Touch</h1>

      <p class="subtitle">
        Want to collaborate, discuss a project, or just ask a question?
        Feel free to reach me on any platform 👇
      </p>

      <div class="contact-info">
        <div class="info-item">
          <i class="fa-solid fa-phone"></i>
          <a class="info-link" [href]="'tel:' + contactInfo.phone">{{ contactInfo.phone }}</a>
        </div>

        <div class="info-item">
          <i class="fa-solid fa-envelope"></i>
          <a class="info-link" [href]="'mailto:' + contactInfo.email">{{ contactInfo.email }}</a>
        </div>

        <div class="info-item">
          <i class="fa-solid fa-location-dot"></i>
          <span>{{ contactInfo.location }}</span>
        </div>
      </div>

      <div class="social-links" role="list">
        
         <a *ngFor="let link of socialLinks"
          role="listitem"
          class="social-btn"
          [href]="link.url"
          target="_blank"
          rel="noopener"
          [attr.aria-label]="link.name"
        >
          <i [class]="link.icon" aria-hidden="true"></i>
          <span>{{ link.name }}</span>
        </a>
      </div>
    </div>

    <div class="contact-right fade-in delay1">
      <img src="assets/PFP.png" alt="Profile photo" />
    </div>

  </div>
</section>
